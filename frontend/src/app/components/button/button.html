<button (click)="onClickEmitter.emit()"
        [class.w-full]="fullButton"
        [disabled]="disabled"
        [ngClass]="[buttonVariants[variant],customClass]"
        [title]="title"
        [type]="type"
        class="flex justify-center items-center gap-2 cursor-pointer text-base/tight py-2 px-4 rounded-md  disabled:cursor-not-allowed disabled:bg-slate-200 disabled:text-slate-500">
  @if (icon) {
    <mat-icon>{{ icon }}</mat-icon>
  }
  <span class="self-end-safe">{{ text }}</span>
</button>
